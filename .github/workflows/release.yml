name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_pypi:
        description: 'Publish to Test PyPI instead of PyPI'
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Run tests
        run: |
          uv run -- python -m pytest tests -m "fast" --tb=short

      - name: Run linting
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run type checking
        run: |
          uv run ty check

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        run: |
          uv build

      - name: Check package
        run: |
          uv tool install twine
          uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.test_pypi == 'true' && 'test-pypi' || 'pypi' }}
      url: ${{ github.event.inputs.test_pypi == 'true' && 'https://test.pypi.org/p/benchbox' || 'https://pypi.org/p/benchbox' }}
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        if: github.event.inputs.test_pypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        if: github.event.inputs.test_pypi != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

  create-github-release:
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_pypi != 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            # Get version from pyproject.toml
            version=$(grep -E '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
            echo "version=v$version" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog for release
        id: changelog
        run: |
          # Extract the latest version section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Get content between the first two version headers
            changelog=$(sed -n '/^## \[/,/^## \[/p' CHANGELOG.md | head -n -1 | tail -n +2)
            if [ -z "$changelog" ]; then
              changelog="See [CHANGELOG.md](https://github.com/joeharris/benchbox/blob/main/CHANGELOG.md) for details."
            fi
          else
            changelog="Initial release of BenchBox - a Python library for database benchmarking."
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Release ${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ### Installation
            ```bash
            uv add benchbox
            # or
            pip install benchbox
            ```

            ### Links
            - [PyPI Package](https://pypi.org/project/benchbox/)
            - [Documentation](https://github.com/joeharris/benchbox)
            - [Changelog](https://github.com/joeharris/benchbox/blob/main/CHANGELOG.md)
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}

  test-installation:
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.11', '3.13']
        exclude:
          # Reduce matrix size for testing
          - os: windows-latest
            python-version: '3.13'
          - os: macos-latest
            python-version: '3.13'
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for package availability
        run: |
          # Wait a bit for package to be available on PyPI
          sleep 60

      - name: Test installation from PyPI
        if: github.event.inputs.test_pypi != 'true'
        run: |
          pip install benchbox
          python -c "import benchbox; print(f'BenchBox {benchbox.__version__} installed successfully')"
          benchbox --help

      - name: Test installation from Test PyPI
        if: github.event.inputs.test_pypi == 'true'
        run: |
          pip install -i https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ benchbox
          python -c "import benchbox; print(f'BenchBox {benchbox.__version__} installed successfully')"
          benchbox --help