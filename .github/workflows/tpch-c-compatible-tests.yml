name: TPC-H C-Compatible Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'benchbox/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'pyproject.toml'
      - 'Makefile'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'benchbox/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'pyproject.toml'
      - 'Makefile'
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test category to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - fast
          - params
          - queries
          - validation
          - comprehensive
      python_version:
        description: 'Python version'
        required: false
        default: '3.11'
        type: choice
        options:
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'

jobs:
  # Fast tests for quick feedback
  fast-tests:
    name: Fast TPC-H C-Compatible Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Set up C implementation
      run: |
        # This would set up the C implementation
        # For now, create a placeholder
        mkdir -p /tmp/tpch_comparison
        echo "# C implementation placeholder" > /tmp/tpch_comparison/README.md
    
    - name: Run fast TPC-H C-compatible tests
      run: |
        make test-tpch-c-ci-fast
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: fast-test-results-${{ matrix.python-version }}
        path: tpch-c-fast-test-results.xml

  # Parameter generation tests
  parameter-tests:
    name: TPC-H C Parameter Tests
    runs-on: ubuntu-latest
    needs: fast-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Set up C implementation
      run: |
        mkdir -p /tmp/tpch_comparison
        echo "# C implementation placeholder" > /tmp/tpch_comparison/README.md
    
    - name: Run parameter generation tests
      run: |
        make test-tpch-c-ci-params
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: parameter-test-results
        path: tpch-c-params-test-results.xml

  # Query generation tests
  query-tests:
    name: TPC-H C Query Tests
    runs-on: ubuntu-latest
    needs: fast-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Set up C implementation
      run: |
        mkdir -p /tmp/tpch_comparison
        echo "# C implementation placeholder" > /tmp/tpch_comparison/README.md
    
    - name: Run query generation tests
      run: |
        make test-tpch-c-ci-queries
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: query-test-results
        path: tpch-c-queries-test-results.xml

  # Validation tests
  validation-tests:
    name: TPC-H C Validation Tests
    runs-on: ubuntu-latest
    needs: [parameter-tests, query-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Set up C implementation
      run: |
        mkdir -p /tmp/tpch_comparison
        echo "# C implementation placeholder" > /tmp/tpch_comparison/README.md
    
    - name: Run validation tests
      run: |
        make test-tpch-c-ci-validation
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: validation-test-results
        path: tpch-c-validation-test-results.xml

  # Comprehensive tests (nightly or on-demand)
  comprehensive-tests:
    name: TPC-H C Comprehensive Tests
    runs-on: ubuntu-latest
    needs: [parameter-tests, query-tests, validation-tests]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Set up C implementation
      run: |
        mkdir -p /tmp/tpch_comparison
        echo "# C implementation placeholder" > /tmp/tpch_comparison/README.md
    
    - name: Run comprehensive tests
      run: |
        make test-tpch-c-ci-comprehensive
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: comprehensive-test-results
        path: tpch-c-comprehensive-test-results.xml

  # Results aggregation and reporting
  report-results:
    name: Generate Test Reports
    runs-on: ubuntu-latest
    needs: [fast-tests, parameter-tests, query-tests, validation-tests]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install matplotlib pandas
    
    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        path: test-results
    
    - name: Generate test reports
      run: |
        python tests/utilities/tpch_c_test_reporting.py \
          --database test_results.db \
          --import-junit test-results/*/tpch-c-*-test-results.xml \
          --session-id "ci-${{ github.run_number }}" \
          --generate-report test-report.html \
          --format html \
          --charts charts/
    
    - name: Upload test reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-reports
        path: |
          test-report.html
          charts/
          test_results.db
    
    - name: Comment PR with results
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Read test results and create comment
          const comment = `
          ## TPC-H C-Compatible Test Results
          
          Test execution completed for commit ${{ github.sha }}.
          
          **Test Categories:**
          - ✅ Fast Tests
          - ✅ Parameter Tests  
          - ✅ Query Tests
          - ✅ Validation Tests
          
          📊 [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  # Performance monitoring (nightly)
  performance-monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Set up C implementation
      run: |
        mkdir -p /tmp/tpch_comparison
        echo "# C implementation placeholder" > /tmp/tpch_comparison/README.md
    
    - name: Run performance tests
      run: |
        pytest -m "tpch_c_performance" --benchmark-enable --benchmark-json=performance-results.json
    
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: performance-results.json
    
    - name: Check performance regression
      run: |
        python tests/utilities/performance_checker.py \
          --results performance-results.json \
          --threshold 10 \
          --baseline performance-baseline.json

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [report-results, comprehensive-tests, performance-monitoring]
    if: always()
    
    steps:
    - name: Cleanup old artifacts
      uses: actions/github-script@v6
      with:
        script: |
          const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
          });
          
          // Keep only the latest 5 artifacts
          const sortedArtifacts = artifacts.artifacts.sort((a, b) => 
            new Date(b.created_at) - new Date(a.created_at)
          );
          
          for (const artifact of sortedArtifacts.slice(5)) {
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
            });
          }